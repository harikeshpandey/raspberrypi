<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raspberry Pi Wi-Fi Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">Raspberry Pi</p>
        <h1>Wi-Fi station monitor</h1>
        <p id="status" class="status">Connecting…</p>
      </header>

      <section class="panel">
        <div class="meta">
          <span>Interface: <strong id="interface">—</strong></span>
          <span>Last update: <strong id="updated">—</strong></span>
        </div>
        <pre id="output">Waiting for station data…</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
